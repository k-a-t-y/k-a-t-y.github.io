<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Life Chapters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: 'oklch(0.95 0.03 210)',
            foreground: 'oklch(0.145 0 0)',
            card: 'oklch(1 0 0)',
            'card-hover': 'oklch(0.97 0 0)',
            muted: 'oklch(0.55 0 0)',
            border: 'oklch(0.9 0.02 210)',
            primary: 'oklch(0.48 0.18 260)',
            'primary-light': 'oklch(0.82 0.1 260)',
            accent: 'oklch(0.55 0.15 240)',
          }
        }
      }
    }
  </script>
  <style>
    :root { --bg: oklch(0.95 0.03 210); --fg: oklch(0.145 0 0); --card-bg: oklch(1 0 0); --card-hover-bg: oklch(0.97 0 0); --muted-text: oklch(0.55 0 0); --border-color: oklch(0.9 0.02 210); --primary: oklch(0.48 0.18 260); --primary-light: oklch(0.82 0.1 260); --accent: oklch(0.55 0.15 240); }
    body { background: var(--bg); color: var(--fg); font-family: 'Chewy', system-ui, -apple-system, sans-serif; }
    .card { background: var(--card-bg); border-color: var(--border-color); }
    .card-hover-bg { background: var(--card-hover-bg); }
    .text-muted { color: var(--muted-text); }
    .border-color { border-color: var(--border-color); }

    /* ── Animations ──────────────────────────────────────── */
    @keyframes fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scale-in { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes float-sparkle { 0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; } 50% { transform: translateY(-14px) rotate(180deg); opacity: 1; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes pulse-soft { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
    @keyframes wave { 0% { transform: translateX(0); } 50% { transform: translateX(-10px); } 100% { transform: translateX(0); } }
    @keyframes glow-pulse { 0%, 100% { box-shadow: 0 0 8px color-mix(in srgb, var(--primary) 30%, transparent); } 50% { box-shadow: 0 0 20px color-mix(in srgb, var(--primary) 50%, transparent), 0 0 40px color-mix(in srgb, var(--primary) 20%, transparent); } }

    .animate-fade-in { animation: fade-in 0.35s ease-out; }
    .animate-slide-up { animation: slide-up 0.45s ease-out; }
    .animate-scale-in { animation: scale-in 0.3s ease-out; }
    .animate-float { animation: float 3s ease-in-out infinite; }
    .animate-sparkle { animation: float-sparkle 4s ease-in-out infinite; }
    .animate-pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }
    .animate-twinkle { animation: twinkle 2.5s ease-in-out infinite; }
    .animate-wave { animation: wave 3s ease-in-out infinite; }
    .animate-glow-pulse { animation: glow-pulse 2s ease-in-out infinite; }

    .shimmer-bg {
      background: linear-gradient(90deg, transparent 0%, color-mix(in srgb, var(--primary) 6%, transparent) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .shimmer-bg::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 30% 50%, color-mix(in srgb, var(--primary) 4%, transparent) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── Layout ──────────────────────────────────────────── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Nav ──────────────────────────────────────────────── */
    .tab-active { color: var(--primary) !important; }
    .tab-inactive { color: var(--muted-text); }
    .tab-inactive:hover { color: var(--fg); }
    .nav-tab { position: relative; }
    .nav-tab.tab-active::after {
      content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
      width: 16px; height: 3px; border-radius: 2px; background: var(--primary);
    }

    /* ── Mood ─────────────────────────────────────────────── */
    .mood-btn { transition: all 0.2s ease; position: relative; overflow: hidden; }
    .mood-btn:hover { transform: scale(1.06); }
    .mood-btn.selected { background: color-mix(in srgb, var(--primary) 20%, transparent) !important; transform: scale(1.12); box-shadow: 0 0 16px color-mix(in srgb, var(--primary) 25%, transparent); }
    .mood-btn.selected .mood-emoji { animation: float 2s ease-in-out infinite; }

    /* ── Pills ────────────────────────────────────────────── */
    .pill-done { background: color-mix(in srgb, var(--primary) 18%, transparent); color: var(--primary); }

    /* ── Buttons ──────────────────────────────────────────── */
    .primary-bg { background: var(--primary); }
    .primary-bg-hover:hover { background: color-mix(in srgb, var(--primary) 85%, black); }
    .primary-ring:focus { outline: 2px solid color-mix(in srgb, var(--primary) 30%, transparent); outline-offset: 2px; }

    /* ── Cards ────────────────────────────────────────────── */
    .gradient-card {
      background: linear-gradient(135deg, color-mix(in srgb, var(--primary) 6%, transparent), var(--card-bg), color-mix(in srgb, var(--accent) 6%, transparent));
      border-color: var(--border-color);
      position: relative;
      overflow: hidden;
    }
    .gradient-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--primary), color-mix(in srgb, var(--primary) 50%, var(--accent)), transparent);
      opacity: 0.6;
    }

    .day-card {
      position: relative; overflow: hidden;
      box-shadow: 0 1px 3px color-mix(in srgb, black 4%, transparent), 0 1px 2px color-mix(in srgb, black 3%, transparent);
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .day-card:hover { box-shadow: 0 4px 16px color-mix(in srgb, black 7%, transparent), 0 2px 4px color-mix(in srgb, black 4%, transparent); transform: translateY(-1px); }
    .day-card::after {
      content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
      background: linear-gradient(to bottom, var(--primary), color-mix(in srgb, var(--primary) 40%, transparent));
      border-radius: 0 2px 2px 0; opacity: 0.3;
    }

    .section-card { position: relative; overflow: hidden; }
    .section-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--primary), color-mix(in srgb, var(--primary) 30%, transparent));
      opacity: 0.25;
    }

    /* ── Mood bars ────────────────────────────────────────── */
    .mood-bar-track { background: var(--card-hover-bg); }
    .mood-bar-fill { background: linear-gradient(to top, var(--primary), color-mix(in srgb, var(--primary) 50%, white)); border-radius: 999px; }

    /* ── Stars ────────────────────────────────────────────── */
    .star-filled { color: var(--accent); }
    .star-empty { opacity: 0.2; }

    /* ── Glass nav ────────────────────────────────────────── */
    .glass-nav { background: color-mix(in srgb, var(--card-bg) 85%, transparent); backdrop-filter: blur(20px) saturate(200%); border-top: 1px solid var(--border-color); }

    /* ── Decorative blobs ─────────────────────────────────── */
    .blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: -1; }
    .blob-1 { width: 300px; height: 300px; background: radial-gradient(circle, color-mix(in srgb, var(--primary) 18%, transparent) 0%, transparent 70%); top: -100px; right: -80px; animation: float 6s ease-in-out infinite; }
    .blob-2 { width: 220px; height: 220px; background: radial-gradient(circle, color-mix(in srgb, var(--accent) 14%, transparent) 0%, transparent 70%); bottom: 120px; left: -80px; animation: float 8s ease-in-out infinite reverse; }
    .blob-3 { width: 180px; height: 180px; background: radial-gradient(circle, color-mix(in srgb, var(--primary) 10%, transparent) 0%, transparent 70%); bottom: -40px; right: 15%; animation: float 5s ease-in-out infinite 1s; }
    .blob-4 { width: 140px; height: 140px; background: radial-gradient(circle, color-mix(in srgb, var(--accent) 10%, transparent) 0%, transparent 70%); top: 40%; left: -40px; animation: float 7s ease-in-out infinite 0.5s; }

    /* ── Sparkles ─────────────────────────────────────────── */
    .sparkle {
      position: fixed; pointer-events: none; z-index: -1;
      font-size: 14px; opacity: 0.5;
    }
    .sparkle:nth-child(5) { top: 15%; left: 8%; animation: float-sparkle 4s ease-in-out infinite; font-size: 10px; }
    .sparkle:nth-child(6) { top: 70%; right: 6%; animation: float-sparkle 5s ease-in-out infinite 1s; font-size: 16px; }
    .sparkle:nth-child(7) { top: 30%; right: 10%; animation: float-sparkle 6s ease-in-out infinite 0.5s; font-size: 8px; }
    .sparkle:nth-child(8) { bottom: 40%; left: 4%; animation: float-sparkle 4.5s ease-in-out infinite 1.5s; font-size: 12px; }

    /* ── Wave header ──────────────────────────────────────── */
    .wave-header {
      position: relative;
    }
    .wave-header::after {
      content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--primary), color-mix(in srgb, var(--primary) 50%, var(--accent)), var(--primary));
      border-radius: 2px;
      animation: shimmer 3s ease-in-out infinite;
      background-size: 200% 100%;
    }

    /* ── Timeline ─────────────────────────────────────────── */
    .chapter-line { background: var(--border-color); }
    .timeline-diamond {
      width: 10px; height: 10px; transform: rotate(45deg);
      background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 60%, var(--accent)));
      box-shadow: 0 0 0 3px var(--bg);
    }

    /* ── Gradient text ────────────────────────────────────── */
    .gradient-text { background: linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 50%, var(--accent))); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

    /* ── Success overlay ──────────────────────────────────── */
    .success-overlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: color-mix(in srgb, var(--bg) 50%, transparent); backdrop-filter: blur(6px); z-index: 50;
      animation: fade-in 0.2s ease-out;
    }
    .success-card {
      background: var(--card-bg); border: 1px solid var(--border-color);
      border-radius: 24px; padding: 2.5rem; text-align: center;
      box-shadow: 0 20px 60px color-mix(in srgb, black 15%, transparent), 0 0 40px color-mix(in srgb, var(--primary) 10%, transparent);
      animation: scale-in 0.3s ease-out;
      position: relative; overflow: hidden;
    }
    .success-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }
    .success-emoji { font-size: 3.5rem; display: block; margin-bottom: 0.5rem; animation: float 2s ease-in-out infinite; }

    /* ── Decorative divider ──────────────────────────────── */
    .divider-dots {
      display: flex; align-items: center; justify-content: center; gap: 6px; padding: 4px 0;
    }
    .divider-dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: color-mix(in srgb, var(--primary) 20%, transparent);
    }

    /* ── Habit grid card ──────────────────────────────────── */
    .habit-grid-card {
      background: linear-gradient(135deg, color-mix(in srgb, var(--primary) 3%, transparent), var(--card-bg));
      border-color: var(--border-color);
    }

    /* ── Scrollbar ───────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--primary) 15%, transparent); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>

  <span class="sparkle">✦</span>
  <span class="sparkle">✦</span>
  <span class="sparkle">✦</span>
  <span class="sparkle">✦</span>

  <main class="flex-1 max-w-lg w-full mx-auto px-4 pb-28 pt-5">
    <!-- Header -->
    <div class="wave-header flex items-center gap-2.5 mb-6 pb-3">
      <span class="text-2xl animate-float">📖</span>
      <div class="flex-1">
        <h1 class="text-xl font-bold gradient-text tracking-tight">Life Chapters</h1>
        <p class="text-[11px] text-muted mt-0.5">Your story, one day at a time</p>
      </div>
      <span class="text-lg animate-sparkle" style="color:var(--primary)">✦</span>
    </div>

    <!-- Timeline View -->
    <div id="view-timeline" class="view active"></div>

    <!-- Check-in View -->
    <div id="view-checkin" class="view"></div>

    <!-- Log View -->
    <div id="view-log" class="view"></div>

    <!-- Habits View -->
    <div id="view-habits" class="view"></div>

    <!-- Recap View -->
    <div id="view-recap" class="view"></div>

    <!-- Period View -->
    <div id="view-period" class="view"></div>
  </main>

  <!-- Bottom Nav -->
  <nav class="glass-nav fixed bottom-0 left-0 right-0 border-t border-color safe-area-bottom">
    <div class="max-w-lg mx-auto flex items-center justify-around h-16">
      <button data-view="timeline" class="nav-tab flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-xl min-w-0 tab-active transition-all duration-200">
        <span class="text-xl leading-none">📖</span>
        <span class="text-[10px] font-semibold leading-tight tracking-wide">Timeline</span>
      </button>
      <button data-view="checkin" class="nav-tab flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-xl min-w-0 tab-inactive transition-all duration-200">
        <span class="text-xl leading-none">✨</span>
        <span class="text-[10px] font-semibold leading-tight tracking-wide">Check-in</span>
      </button>
      <button data-view="log" class="nav-tab flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-xl min-w-0 tab-inactive transition-all duration-200">
        <span class="text-xl leading-none">🎬</span>
        <span class="text-[10px] font-semibold leading-tight tracking-wide">Log</span>
      </button>
      <button data-view="habits" class="nav-tab flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-xl min-w-0 tab-inactive transition-all duration-200">
        <span class="text-xl leading-none">🏃</span>
        <span class="text-[10px] font-semibold leading-tight tracking-wide">Habits</span>
      </button>
      <button data-view="recap" class="nav-tab flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-xl min-w-0 tab-inactive transition-all duration-200">
        <span class="text-xl leading-none">📊</span>
        <span class="text-[10px] font-semibold leading-tight tracking-wide">Recap</span>
      </button>
      <button data-view="period" id="nav-period" class="nav-tab flex flex-col items-center gap-0.5 px-3 py-1.5 rounded-xl min-w-0 tab-inactive transition-all duration-200" style="display:none">
        <span class="text-xl leading-none">🩸</span>
        <span class="text-[10px] font-semibold leading-tight tracking-wide">Period</span>
      </button>
    </div>
  </nav>

  <script>
    // ─── State & Data Layer ──────────────────────────────────────────────
    const MOOD_EMOJIS = { 1: '😞', 2: '😐', 3: '🙂', 4: '😊', 5: '🤩' };
    const TYPE_EMOJIS = { movie: '🎬', show: '📺', song: '🎵', book: '📖', audiobook: '🎧', podcast: '🎙️' };
    const TYPE_LABELS = { movie: 'Movies', show: 'TV Shows', song: 'Songs', book: 'Books', audiobook: 'Audiobooks', podcast: 'Podcasts' };
    const LIKES_OPTIONS = [
      'Story', 'Characters', 'Writing', 'Acting', 'Music', 'Visuals',
      'Humor', 'Plot', 'Atmosphere', 'Pacing', 'Emotion', 'Production',
      'Narration', 'Insight', 'Energy', 'Cinematography', 'World-building', 'Themes'
    ];
    const MOODS = [
      { value: 1, emoji: '😞', label: 'Rough' },
      { value: 2, emoji: '😐', label: 'Meh' },
      { value: 3, emoji: '🙂', label: 'Okay' },
      { value: 4, emoji: '😊', label: 'Good' },
      { value: 5, emoji: '🤩', label: 'Great' },
    ];
    const ENERGY_LEVELS = [
      { value: 1, emoji: '🪫', label: 'Drained' },
      { value: 2, emoji: '🔋', label: 'Low' },
      { value: 3, emoji: '⚡', label: 'Steady' },
      { value: 4, emoji: '⚡⚡', label: 'Energetic' },
      { value: 5, emoji: '🔥', label: 'Buzzing' },
    ];
    const WEATHERS = [
      { value: 'sunny', emoji: '☀️', label: 'Sunny' },
      { value: 'cloudy', emoji: '☁️', label: 'Cloudy' },
      { value: 'rainy', emoji: '🌧️', label: 'Rainy' },
      { value: 'snowy', emoji: '❄️', label: 'Snowy' },
      { value: 'windy', emoji: '💨', label: 'Windy' },
    ];
    const DURATIONS = [5, 10, 15, 20, 30, 45, 60, 90, 120, 180, 240, 300];
    const ENTRIES_KEY = 'life-entries';
    const HABITS_KEY = 'life-habits';

    const DEFAULT_HABITS = [
      'Exercising', 'Reading', 'Meditating', 'Walking', 'Running', 'Yoga', 'Stretching',
      'Cooking', 'Journaling', 'Studying', 'Working', 'Cleaning', 'Gardening', 'Writing',
      'Painting', 'Playing music', 'Dancing', 'Swimming', 'Biking', 'Hiking',
      'Drawing', 'Playing sports', 'Learning something new', 'Exploring new places',
      'Practicing language', 'Photography', 'Volunteering', 'Baking', 'Calling a friend', 'Climbing'
    ];

    const PROFILE_KEY = 'life-profile';
    const PERIODS_KEY = 'life-periods';
    const PERIOD_SYMPTOMS = ['Cramps','Bloating','Headache','Fatigue','Mood swings','Backache','Nausea','Breast tenderness','Acne','Insomnia'];
    const FLOW_LEVELS = ['Light', 'Medium', 'Heavy'];
    const COLOR_SCHEMES = {
      pink:    { h: 10,  a: 30  },
      red:     { h: 30,  a: 10  },
      orange:  { h: 60,  a: 40  },
      yellow:  { h: 100, a: 80  },
      green:   { h: 150, a: 130 },
      blue:    { h: 250, a: 230 },
      purple:  { h: 300, a: 280 },
      black:   { h: 0,   a: 0, n: true },
      grey:    { h: 0,   a: 0, n: true },
      white:   { h: 0,   a: 0, n: true },
    };

    function loadProfile() { try { const r = localStorage.getItem(PROFILE_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
    function saveProfile(p) { localStorage.setItem(PROFILE_KEY, JSON.stringify(p)); }
    function loadPeriods() { try { const r = localStorage.getItem(PERIODS_KEY); return r ? JSON.parse(r) : { logs: {}, cycleLength: 28, periodLength: 5 }; } catch { return { logs: {}, cycleLength: 28, periodLength: 5 }; } }
    function savePeriods(p) { localStorage.setItem(PERIODS_KEY, JSON.stringify(p)); }
    function isNeutral(c) { return COLOR_SCHEMES[c]?.n; }
    function schemeValue(h, c, L) { return `oklch(${L} ${c} ${h})`; }

    const ACCOUNTS_KEY = 'life-accounts';
    const SESSION_KEY = 'life-session';
    const BANNED_WORDS = ['fuck','shit','ass','bitch','damn','crap','dick','piss','slut','whore','bastard','cock','cunt'];
    function simpleHash(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return 'h' + Math.abs(h).toString(36); }
    function loadAccounts() { try { const r = localStorage.getItem(ACCOUNTS_KEY); return r ? JSON.parse(r) : {}; } catch { return {}; } }
    function saveAccounts(a) { localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(a)); }
    function getSession() { try { const r = localStorage.getItem(SESSION_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
    function setSession(u) { localStorage.setItem(SESSION_KEY, JSON.stringify({ username: u })); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }
    function hasAccounts() { return Object.keys(loadAccounts()).length > 0; }
    function hasAccountBanner() {
      const entries = loadEntries();
      if (entries.length === 0) return false;
      if (hasAccounts()) return false;
      return !localStorage.getItem('life-banner-dismissed');
    }
    function containsBannedWord(s) {
      const lower = s.toLowerCase();
      return BANNED_WORDS.some(w => lower.includes(w));
    }
    function buildTheme(colorName, dark) {
      const c = COLOR_SCHEMES[colorName] || COLOR_SCHEMES.blue;
      const h = c.h; const a = c.a;
      const neutral = c.n;
      if (neutral) {
        return dark
          ? { bg: 'oklch(0.18 0 0)', fg: 'oklch(0.985 0 0)', card: 'oklch(0.24 0 0)', hover: 'oklch(0.3 0 0)', muted: 'oklch(0.65 0 0)', border: 'oklch(0.3 0 0)', primary: 'oklch(0.65 0 0)', pl: 'oklch(0.35 0 0)', accent: 'oklch(0.6 0 0)' }
          : { bg: 'oklch(0.95 0 0)', fg: 'oklch(0.145 0 0)', card: 'oklch(1 0 0)', hover: 'oklch(0.97 0 0)', muted: 'oklch(0.55 0 0)', border: 'oklch(0.9 0 0)', primary: 'oklch(0.48 0 0)', pl: 'oklch(0.82 0 0)', accent: 'oklch(0.55 0 0)' };
      }
      const ch = 0.18;
      return dark
        ? { bg: schemeValue(h, 0.05, 0.18), fg: 'oklch(0.985 0 0)', card: schemeValue(h, 0.04, 0.24), hover: schemeValue(h, 0.04, 0.3), muted: 'oklch(0.65 0 0)', border: schemeValue(h, 0.04, 0.3), primary: schemeValue(h, ch, 0.7), pl: schemeValue(h, 0.1, 0.32), accent: schemeValue(a, 0.15, 0.65) }
        : { bg: schemeValue(h, 0.03, 0.95), fg: 'oklch(0.145 0 0)', card: 'oklch(1 0 0)', hover: 'oklch(0.97 0 0)', muted: 'oklch(0.55 0 0)', border: schemeValue(h, 0.02, 0.9), primary: schemeValue(h, ch, 0.48), pl: schemeValue(h, 0.1, 0.82), accent: schemeValue(a, 0.15, 0.55) };
    }

    function loadEntries() { try { const r = localStorage.getItem(ENTRIES_KEY); return r ? JSON.parse(r) : []; } catch { return []; } }
    function saveEntries(entries) { localStorage.setItem(ENTRIES_KEY, JSON.stringify(entries)); }
    function todayStr() { return new Date().toISOString().split('T')[0]; }
    function getTodayEntry(entries) { return entries.find(e => e.date === todayStr()); }
    function loadHabits() { try { const r = localStorage.getItem(HABITS_KEY); return r ? JSON.parse(r) : null; } catch { return null; } }
    function saveHabits(h) { localStorage.setItem(HABITS_KEY, JSON.stringify(h)); }
    function getHabits() {
      const saved = loadHabits();
      if (saved && Array.isArray(saved) && saved.length > 0) return saved;
      saveHabits(DEFAULT_HABITS);
      return [...DEFAULT_HABITS];
    }

    function upsertEntry(entry) {
      const entries = loadEntries();
      const idx = entries.findIndex(e => e.date === entry.date);
      if (idx >= 0) entries[idx] = entry; else entries.push(entry);
      entries.sort((a, b) => b.date.localeCompare(a.date));
      saveEntries(entries); return entries;
    }

    function addEntertainment(date, item) {
      const entries = loadEntries();
      let entry = entries.find(e => e.date === date);
      if (!entry) { entry = { date, habits: [], entertainment: [] }; entries.push(entry); }
      entry.entertainment.push(item);
      entries.sort((a, b) => b.date.localeCompare(a.date));
      saveEntries(entries); return entries;
    }

    function generateChapters(entries) {
      if (entries.length === 0) return [];
      const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
      const chapters = []; let chapterEntries = []; let chapterStart;
      for (const entry of sorted) {
        if (chapterEntries.length === 0) chapterStart = entry.date;
        chapterEntries.push(entry);
        if (chapterEntries.length === 7) {
          chapters.push(buildChapter(chapterStart, entry.date, chapterEntries));
          chapterEntries = [];
        }
      }
      if (chapterEntries.length > 0)
        chapters.push(buildChapter(chapterStart, sorted[sorted.length - 1].date, chapterEntries));
      return chapters.reverse();
    }

    function buildChapter(start, end, entries) {
      const moods = entries.filter(e => e.mood).map(e => e.mood);
      const avgMood = moods.length > 0 ? Math.round(moods.reduce((a, b) => a + b, 0) / moods.length) : 3;
      const allHabits = entries.flatMap(e => e.habits.filter(h => h.duration > 0).map(h => h.name));
      const topHabit = allHabits.length > 0 ? allHabits.sort((a, b) => allHabits.filter(h => h === b).length - allHabits.filter(h => h === a).length)[0] : null;
      const allEnt = entries.flatMap(e => e.entertainment);
      const typeCounts = {};
      for (const ent of allEnt) typeCounts[ent.type] = (typeCounts[ent.type] || 0) + 1;
      const topType = Object.entries(typeCounts).sort((a, b) => b[1] - a[1])[0];
      const moodLabels = { 1: 'Tough', 2: 'Low', 3: 'Steady', 4: 'Good', 5: 'Great' };
      const titles = [];
      if (topHabit) titles.push('The Week You Rediscovered ' + topHabit);
      if (topType) titles.push('The ' + topType[0].charAt(0).toUpperCase() + topType[0].slice(1) + ' Week');
      titles.push('A ' + moodLabels[avgMood] + ' Week');
      return { id: start + '-' + end, startDate: start, endDate: end, title: titles[0] };
    }

    function getWeekRange() {
      const now = new Date(); const dow = now.getDay(); const diff = dow === 0 ? 6 : dow - 1;
      const mon = new Date(now); mon.setDate(now.getDate() - diff);
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      return { start: mon.toISOString().split('T')[0], end: sun.toISOString().split('T')[0] };
    }
    function getWeekEntries(entries) { const { start, end } = getWeekRange(); return entries.filter(e => e.date >= start && e.date <= end); }

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return { dayName: d.toLocaleDateString('en-US', { weekday: 'short' }), formatted: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) };
    }
    function formatDateLong(dateStr) {
      return new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    function formatWeek() {
      const now = new Date(); const dow = now.getDay(); const diff = dow === 0 ? 6 : dow - 1;
      const mon = new Date(now); mon.setDate(now.getDate() - diff);
      return 'Week of ' + mon.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
    }
    function nextWeekEnd() {
      const d = new Date(); d.setDate(d.getDate() + 7);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // ─── Dynamic Theming ─────────────────────────────────────────────────
    function applyProfileTheme(profile) {
      const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const color = profile?.color || 'blue';
      const t = buildTheme(color, dark);
      document.body.classList.toggle('dark', dark);
      Object.entries(t).forEach(([k, v]) => {
        const map = { pl: 'primary-light', hover: 'card-hover-bg', card: 'card-bg', muted: 'muted-text', border: 'border-color' };
        document.documentElement.style.setProperty('--' + (map[k] || k), v);
      });
    }
    applyProfileTheme(loadProfile());
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => applyProfileTheme(loadProfile()));

    // ─── Navigation ─────────────────────────────────────────────────────
    const views = {};
    ['timeline', 'checkin', 'log', 'habits', 'recap', 'period'].forEach(k => views[k] = document.getElementById('view-' + k));
    const navTabs = document.querySelectorAll('.nav-tab');

    function switchView(name) {
      Object.keys(views).forEach(k => views[k].classList.toggle('active', k === name));
      navTabs.forEach(tab => {
        tab.classList.toggle('tab-active', tab.dataset.view === name);
        tab.classList.toggle('tab-inactive', tab.dataset.view !== name);
      });
      if (name === 'timeline') renderTimeline();
      else if (name === 'checkin') renderCheckin();
      else if (name === 'log') renderLog();
      else if (name === 'habits') renderHabits();
      else if (name === 'period') renderPeriod();
      else if (name === 'recap') renderRecap();
    }
    navTabs.forEach(tab => tab.addEventListener('click', () => switchView(tab.dataset.view)));

    // ─── Show Success ────────────────────────────────────────────────────
    function showSuccess(emoji, msg, cb) {
      const div = document.createElement('div');
      div.className = 'success-overlay';
      div.innerHTML = `<div class="success-card"><span class="success-emoji">${emoji}</span><p class="text-lg font-semibold">${msg}</p></div>`;
      document.body.appendChild(div);
      setTimeout(() => { div.remove(); if (cb) cb(); }, 1200);
    }

    // ─── Check-in State ──────────────────────────────────────────────────
    let checkinMood, checkinEnergy, checkinWeather, checkinSleep;
    let checkinHabits = [];
    let checkinJournal = '';

    // ─── Log State ───────────────────────────────────────────────────────
    let logType = 'movie';
    let logTitle = '';
    let logRating = 3;
    let logTag = '';
    let logLikes = [];
    let logLikesCustom = '';
    let logArtist = '';
    let logAuthor = '';
    let logHost = '';

    // ─── Day Sentence Generator ──────────────────────────────────────────
    function generateDaySentence(entry) {
      const mood = entry.mood ? MOOD_EMOJIS[entry.mood] : null;
      const moodWord = entry.mood ? ['pretty rough', 'meh', 'okay', 'good', 'great'][entry.mood - 1] : null;
      const habits = (entry.habits || []).filter(h => h.duration > 0);
      const ents = entry.entertainment || [];
      const journal = entry.journal;

      const parts = [];

      if (habits.length > 0) {
        const h = habits[Math.floor(Math.random() * habits.length)];
        parts.push({ type: 'habit', text: `${h.name} for ${h.duration}m` });
      }

      if (mood) {
        parts.push({ type: 'mood', text: `felt ${moodWord}`, emoji: mood });
      }

      if (ents.length > 0) {
        const e = ents[Math.floor(Math.random() * ents.length)];
        const typeVerb = { movie: 'watched', show: 'watched', song: 'listened to', book: 'read', audiobook: 'listened to', podcast: 'listened to' }[e.type] || 'checked out';
        const meta = e.artist ? ` by ${e.artist}` : e.author ? ` by ${e.author}` : e.host ? ` (hosted by ${e.host})` : '';
        const likes = (e.likes || []).filter(Boolean);
        let entStr = `${typeVerb} "${e.title}"${meta}`;
        if (likes.length > 0) {
          const sample = likes.slice(0, Math.min(2, likes.length));
          entStr += ` (liked: ${sample.join(', ')})`;
        }
        parts.push({ type: 'ent', text: entStr });
      }

      if (journal) {
        parts.push({ type: 'journal', text: `"${journal}"` });
      }

      if (parts.length === 0) return null;

      // Shuffle parts
      for (let i = parts.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [parts[i], parts[j]] = [parts[j], parts[i]];
      }

      const moodEmoji = parts.find(p => p.type === 'mood')?.emoji || '';
      const nonMoodParts = parts.filter(p => p.type !== 'mood');
      const moodPart = parts.find(p => p.type === 'mood');

      // Build sentence
      let sentence = '';
      if (nonMoodParts.length === 1) {
        sentence = `${nonMoodParts[0].text}.`;
        if (moodPart) sentence = `${moodPart.emoji} ${sentence}`;
      } else if (nonMoodParts.length === 2) {
        sentence = `${nonMoodParts[0].text} and ${nonMoodParts[1].text}.`;
        if (moodPart) sentence = `${moodPart.emoji} ${sentence}`;
      } else {
        const last = nonMoodParts.pop();
        sentence = nonMoodParts.map(p => p.text).join(', ') + `, and ${last.text}.`;
        if (moodPart) sentence = `${moodPart.emoji} ${sentence}`;
      }

      return sentence.charAt(0).toUpperCase() + sentence.slice(1);
    }

    // ─── Render Timeline ─────────────────────────────────────────────────
    function renderTimeline() {
      const el = views.timeline;
      const entries = loadEntries();
      if (entries.length === 0) {
        el.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-center space-y-4">

        </div>`;
        return;
      }
      const chapters = generateChapters(entries);
      let html = '';
      for (let i = 0; i < entries.length; i++) {

        localStorage.setItem('life-banner-dismissed', '1');
        renderTimeline();
      });
    }

    function renderChapter(ch) {
      const { formatted: d1 } = formatDate(ch.startDate);
      const { formatted: d2 } = formatDate(ch.endDate);
      return `<div class="relative py-5">
        <div class="absolute left-[11px] top-0 bottom-0 w-0.5 chapter-line"></div>

          <div class="relative z-10 mt-0.5 w-[26px] h-[26px] rounded-full flex items-center justify-center animate-scale-in" style="background:linear-gradient(135deg, var(--primary), color-mix(in srgb, var(--primary) 60%, var(--accent)));box-shadow:0 0 0 4px var(--bg)">

          </div>
        </div>

    function renderDayCard(entry) {
      const { dayName, formatted } = formatDate(entry.date);
      let extras = '';
      if (entry.energy) extras += `<span class="text-xs">${ENERGY_LEVELS[entry.energy - 1].emoji}</span> `;
      if (entry.weather) extras += `<span class="text-xs">${WEATHERS.find(w => w.value === entry.weather).emoji}</span> `;
      if (entry.sleep) extras += `<span class="text-xs text-muted" title="Sleep">💤 ${entry.sleep}h</span> `;

      let habitsHtml = '';
      if (entry.habits && entry.habits.length > 0) {
        habitsHtml = '<div class="flex flex-wrap gap-1.5">' + entry.habits.filter(h => h.duration > 0).map(h =>
          `<span class="text-xs px-2 py-0.5 rounded-full pill-done">${h.name} ${h.duration}m</span>`
        ).join('') + '</div>';
      }
      const journalHtml = entry.journal ? `<p class="text-sm leading-relaxed italic" style="color:color-mix(in srgb, var(--fg) 75%, transparent)">“${entry.journal}”</p>` : '';
      let entHtml = '';
      if (entry.entertainment && entry.entertainment.length > 0) {
        entHtml = '<div class="space-y-1.5 pt-1 border-t border-color mt-2">' + entry.entertainment.map(e => {

            ? '<div class="flex flex-wrap gap-1 mt-1">' + likes.map(l =>
                `<span class="text-[10px] px-1.5 py-0.5 rounded-full" style="background:color-mix(in srgb, var(--primary) 10%, transparent);color:color-mix(in srgb, var(--primary) 80%, white)">${l}</span>`
              ).join('') + '</div>'
            : '';
          const meta = e.artist ? `by ${e.artist}` : e.author ? `by ${e.author}` : e.host ? `hosted by ${e.host}` : '';
          return `<div class="flex items-center gap-2 text-sm text-muted">

        }).join('') + '</div>';
      }
      const sentence = generateDaySentence(entry);
      const sentenceHtml = sentence
        ? `<p class="text-sm leading-relaxed font-medium" style="color:color-mix(in srgb, var(--fg) 88%, var(--primary))">${sentence}</p>`
        : '';

      return `<div class="day-card card border rounded-2xl p-4 space-y-3 animate-fade-in">

          </div>
        </div>
        ${sentenceHtml}
        ${habitsHtml}
        ${journalHtml}
        ${entHtml}
        ${(!entry.habits || entry.habits.length === 0) && !entry.journal && (!entry.entertainment || entry.entertainment.length === 0) && !entry.mood
          ? '<p class="text-xs text-muted">Quick check-in — no details logged</p>' : ''}
      </div>`;
    }

    // ─── Render Check-in ─────────────────────────────────────────────────
    function renderCheckin() {
      const entries = loadEntries();
      const today = getTodayEntry(entries);
      if (today) {
        checkinMood = today.mood;
        checkinEnergy = today.energy;
        checkinWeather = today.weather;
        checkinSleep = today.sleep;
        checkinHabits = today.habits.map(h => ({ ...h }));
        checkinJournal = today.journal || '';
      } else {
        checkinMood = undefined; checkinEnergy = undefined; checkinWeather = undefined; checkinSleep = undefined;
        checkinHabits = []; checkinJournal = '';
      }
      renderCheckinForm();
    }

          </div>

          <div class="section-card card border border-color rounded-2xl p-3.5 space-y-2.5">
