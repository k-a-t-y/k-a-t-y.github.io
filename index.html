          <div class="card border border-color rounded-2xl p-3.5 space-y-2">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider">Note</label>
            <input id="journal-input" type="text" value="${checkinJournal.replace(/"/g, '&quot;')}" placeholder="What stood out today?" maxlength="140" class="w-full bg-transparent text-sm border-0 outline-none primary-ring py-1" style="color:var(--fg)" />
          </div>

          <button type="submit" class="w-full py-3.5 rounded-2xl primary-bg text-white font-semibold text-sm transition-all active:scale-[0.98] hover:opacity-90" style="opacity:${checkinMood ? 1 : 0.4}">
            Save check-in
          </button>
        </form>
      </div>`;

      // Attach events
      document.querySelectorAll('.mood-btn').forEach(btn =>
        btn.addEventListener('click', () => { checkinMood = parseInt(btn.dataset.mood); renderCheckinForm(); }));
      document.querySelectorAll('.energy-btn').forEach(btn =>
        btn.addEventListener('click', () => { checkinEnergy = parseInt(btn.dataset.energy); renderCheckinForm(); }));
      document.querySelectorAll('.weather-btn').forEach(btn =>
        btn.addEventListener('click', () => { checkinWeather = btn.dataset.weather; renderCheckinForm(); }));
      document.querySelectorAll('.sleep-btn').forEach(btn =>
        btn.addEventListener('click', () => { checkinSleep = parseInt(btn.dataset.sleep); renderCheckinForm(); }));
      document.querySelectorAll('.habit-btn').forEach(btn =>
        btn.addEventListener('click', () => {
          const name = btn.dataset.habitName;
          const existing = checkinHabits.find(h => h.name === name);
          if (existing) {
            checkinHabits = checkinHabits.filter(h => h.name !== name);
          } else {
            checkinHabits.push({ name, duration: 30 });
          }
          renderCheckinForm();
        }));
      document.querySelectorAll('.habit-dur').forEach(sel =>
        sel.addEventListener('change', () => {
          const name = sel.dataset.habitName;
          const h = checkinHabits.find(x => x.name === name);
          if (h) h.duration = parseInt(sel.value);
        }));
      document.getElementById('journal-input').addEventListener('input', e => { checkinJournal = e.target.value; });
      document.getElementById('checkin-form').addEventListener('submit', e => {
        e.preventDefault();
        if (!checkinMood) return;
        upsertEntry({
          date: todayStr(), mood: checkinMood, energy: checkinEnergy, weather: checkinWeather, sleep: checkinSleep,
          habits: checkinHabits.filter(h => h.duration > 0),
          journal: checkinJournal.trim() || undefined, entertainment: [],
        });
        showSuccess('✨', 'Checked in!', () => switchView('timeline'));
      });
    }

    // ─── Render Log ──────────────────────────────────────────────────────
    function renderLog() {
      const typeHtml = [
        { value: 'movie', emoji: '🎬', label: 'Movie' },
        { value: 'show', emoji: '📺', label: 'Show' },
        { value: 'song', emoji: '🎵', label: 'Song' },
        { value: 'book', emoji: '📖', label: 'Book' },
        { value: 'audiobook', emoji: '🎧', label: 'Audiobook' },
        { value: 'podcast', emoji: '🎙️', label: 'Podcast' },
      ].map(t =>
        `<button type="button" data-type="${t.value}" class="type-btn flex flex-col items-center gap-1 p-2.5 rounded-2xl transition-all flex-1 ${logType === t.value ? 'selected' : 'card border border-color hover:card-hover-bg'}" style="${logType === t.value ? 'background:color-mix(in srgb, var(--primary) 18%, transparent);transform:scale(1.08)' : ''}">
          <span class="text-xl">${t.emoji}</span>
          <span class="text-[8px] font-medium text-muted leading-tight">${t.label}</span>
        </button>`
      ).join('');

      const starsHtml = [1,2,3,4,5].map(r =>
        `<button type="button" data-rating="${r}" class="rating-btn text-2xl transition-all duration-200 ${logRating >= r ? 'star-filled' : 'star-empty hover:star-filled hover:opacity-50'}" style="${logRating >= r ? 'transform:scale(1.15)' : ''}">★</button>`
      ).join('');

      const likesHtml = LIKES_OPTIONS.map(opt => {
        const sel = logLikes.includes(opt);
        return `<button type="button" data-like="${opt}" class="like-btn px-2.5 py-1.5 rounded-full text-xs font-medium transition-all ${sel ? 'primary-bg text-white' : 'card border border-color text-muted hover:border-primary/50'}">${opt}</button>`;
      }).join('');

      views.log.innerHTML = `<div class="space-y-5 animate-fade-in">
        <div class="text-center space-y-1 pb-1">
          <h2 class="text-lg font-bold">Entertainment Log</h2>
          <p class="text-xs text-muted">Log what you watched, read, or listened to</p>
        </div>
        <form id="log-form" class="space-y-4">
          <div class="shimmer-bg rounded-2xl p-4 space-y-3">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider">Type</label>
            <div class="grid grid-cols-6 gap-1.5">${typeHtml}</div>
          </div>
          <div class="section-card card border border-color rounded-2xl p-3.5 space-y-2">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider" for="log-title-input">Title</label>
            <input id="log-title-input" type="text" value="${logTitle.replace(/"/g, '&quot;')}" placeholder="e.g. Dune: Part Two" class="w-full bg-transparent text-sm border-0 outline-none primary-ring py-1" style="color:var(--fg)" />
          </div>
          ${['song'].includes(logType) ? `<div class="section-card card border border-color rounded-2xl p-3.5 space-y-2 animate-fade-in">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider" for="log-artist-input">Artist</label>
            <input id="log-artist-input" type="text" value="${logArtist.replace(/"/g, '&quot;')}" placeholder="e.g. Kendrick Lamar" class="w-full bg-transparent text-sm border-0 outline-none primary-ring py-1" style="color:var(--fg)" />
          </div>` : ''}
          ${['book', 'audiobook'].includes(logType) ? `<div class="section-card card border border-color rounded-2xl p-3.5 space-y-2 animate-fade-in">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider" for="log-author-input">Author</label>
            <input id="log-author-input" type="text" value="${logAuthor.replace(/"/g, '&quot;')}" placeholder="e.g. Frank Herbert" class="w-full bg-transparent text-sm border-0 outline-none primary-ring py-1" style="color:var(--fg)" />
          </div>` : ''}
          ${['podcast'].includes(logType) ? `<div class="section-card card border border-color rounded-2xl p-3.5 space-y-2 animate-fade-in">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider" for="log-host-input">Host</label>
            <input id="log-host-input" type="text" value="${logHost.replace(/"/g, '&quot;')}" placeholder="e.g. Lex Fridman" class="w-full bg-transparent text-sm border-0 outline-none primary-ring py-1" style="color:var(--fg)" />
          </div>` : ''}
           <div class="section-card card border border-color rounded-2xl p-3.5 space-y-2.5">
            <div class="flex items-center justify-between">
              <label class="text-xs font-semibold text-muted uppercase tracking-wider">Rating</label>
              <span class="text-[10px] text-muted">${logRating}/5</span>
            </div>
            <div class="flex gap-1 justify-center py-1">${starsHtml}</div>
          </div>
          <div class="section-card card border border-color rounded-2xl p-3.5 space-y-2.5">
            <div class="flex items-center justify-between">
              <label class="text-xs font-semibold text-muted uppercase tracking-wider">What I Liked</label>
              <span class="text-[10px] text-muted">Tap to select</span>
            </div>
            <div class="flex flex-wrap gap-1.5">${likesHtml}</div>
            <input type="text" value="${logLikesCustom.replace(/"/g, '&quot;')}" placeholder="Or type something else..." maxlength="60" class="like-custom-input w-full bg-transparent text-xs border-0 outline-none primary-ring py-1 border-t border-color pt-2 mt-1" style="color:var(--fg)" />
          </div>
          <div class="section-card card border border-color rounded-2xl p-3.5 space-y-2">
            <label class="text-xs font-semibold text-muted uppercase tracking-wider" for="log-tag-input">Tag <span class="font-normal text-muted">optional</span></label>
            <input id="log-tag-input" type="text" value="${logTag.replace(/"/g, '&quot;')}" placeholder="e.g. sci-fi, thriller, jazz" class="w-full bg-transparent text-sm border-0 outline-none primary-ring py-1" style="color:var(--fg)" />
          </div>
          <button type="submit" class="w-full py-3.5 rounded-2xl primary-bg text-white font-semibold text-sm transition-all active:scale-[0.98] hover:opacity-90" style="opacity:${logTitle.trim() ? 1 : 0.4}">Log it</button>
        </form>
      </div>`;

      document.querySelectorAll('.type-btn').forEach(btn =>
        btn.addEventListener('click', () => { logType = btn.dataset.type; renderLog(); }));
      document.querySelectorAll('.rating-btn').forEach(btn =>
        btn.addEventListener('click', () => { logRating = parseInt(btn.dataset.rating); renderLog(); }));
      document.querySelectorAll('.like-btn').forEach(btn =>
        btn.addEventListener('click', () => {
          const opt = btn.dataset.like;
          if (logLikes.includes(opt)) logLikes = logLikes.filter(x => x !== opt);
          else logLikes = [...logLikes, opt];
          renderLog();
        }));
      document.querySelectorAll('.like-custom-input').forEach(inp =>
        inp.addEventListener('input', e => { logLikesCustom = e.target.value; }));
      document.getElementById('log-title-input').addEventListener('input', e => {
        logTitle = e.target.value;
        const btn = document.querySelector('#log-form button[type="submit"]');
        if (btn) btn.style.opacity = logTitle.trim() ? 1 : 0.4;
      });
      const fieldId = { song: 'log-artist-input', book: 'log-author-input', audiobook: 'log-author-input', podcast: 'log-host-input' }[logType];
      if (fieldId) {
        const el = document.getElementById(fieldId);
        if (el) el.addEventListener('input', e => {
          const v = e.target.value;
          if (logType === 'song') logArtist = v;
          else if (['book', 'audiobook'].includes(logType)) logAuthor = v;
          else if (logType === 'podcast') logHost = v;
        });
      }
      document.getElementById('log-tag-input').addEventListener('input', e => { logTag = e.target.value; });
      document.getElementById('log-form').addEventListener('submit', e => {
        e.preventDefault();
        if (!logTitle.trim()) return;
        const allLikes = [...logLikes];
        if (logLikesCustom.trim()) allLikes.push(logLikesCustom.trim());
        addEntertainment(todayStr(), {
          id: Date.now() + '-' + Math.random().toString(36).slice(2, 6),
          type: logType, title: logTitle.trim(), rating: logRating,
          tag: logTag.trim() || undefined,
          artist: logType === 'song' ? logArtist.trim() || undefined : undefined,
          author: ['book', 'audiobook'].includes(logType) ? logAuthor.trim() || undefined : undefined,
          host: logType === 'podcast' ? logHost.trim() || undefined : undefined,
          likes: allLikes,
        });
        showSuccess('🎉', 'Logged!', () => { logTitle = ''; logTag = ''; logRating = 3; logLikes = []; logLikesCustom = ''; logArtist = ''; logAuthor = ''; logHost = ''; renderLog(); });
      });
    }

    // ─── Render Habits ───────────────────────────────────────────────────
    function renderHabits() {
      const list = getHabits();
      const itemsHtml = list.map((h, i) =>
        `<div class="flex items-center gap-2 card border border-color rounded-xl px-3.5 py-2.5 animate-fade-in" style="animation-delay:${i * 0.04}s">
          <span class="flex-1 text-sm font-medium">${h}</span>
          <button type="button" data-idx="${i}" class="delete-habit-btn text-xs px-2 py-1 rounded-lg transition-all" style="color:var(--muted-text);background:color-mix(in srgb, red 8%, transparent)" title="Delete habit">✕</button>
        </div>`
      ).join('');

      views.habits.innerHTML = `<div class="space-y-5 animate-fade-in">
        <div class="text-center space-y-1 pb-1">
          <h2 class="text-lg font-bold">Manage Habits</h2>
          <p class="text-xs text-muted">Customize your habit list</p>
        </div>

        <!-- Add new habit -->
        <form id="add-habit-form" class="shimmer-bg rounded-2xl p-4 space-y-3">
          <label class="text-xs font-semibold text-muted uppercase tracking-wider">Add Habit</label>
          <div class="flex gap-2">
            <input type="text" id="new-habit-input" placeholder="e.g. Rock climbing" maxlength="40" class="flex-1 bg-transparent text-sm border border-color rounded-xl px-3 py-2 outline-none primary-ring" style="color:var(--fg)" />
            <button type="submit" class="px-4 py-2 rounded-xl primary-bg text-white text-sm font-semibold transition-all hover:opacity-90 active:scale-95">Add</button>
          </div>
        </form>

        <!-- Current habits -->
        <div class="section-card card border border-color rounded-2xl p-4 space-y-2">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-semibold text-muted uppercase tracking-wider">Your Habits</span>
            <span class="text-[10px] text-muted">${list.length}</span>
          </div>
          <div class="space-y-1.5 max-h-80 overflow-y-auto overscroll-y-contain" style="-webkit-overflow-scrolling:touch;scrollbar-width:thin">
            ${itemsHtml}
          </div>
          ${list.length === 0 ? '<p class="text-xs text-muted text-center py-4">No habits yet. Add one above!</p>' : ''}
        </div>

        <!-- Reset to defaults -->
        <button id="reset-habits-btn" class="w-full py-2.5 rounded-2xl text-sm font-medium transition-all active:scale-[0.98] hover:opacity-80" style="color:var(--muted-text);background:color-mix(in srgb, var(--muted-text) 8%, transparent)">
          Reset to defaults
        </button>
      </div>`;

      document.getElementById('add-habit-form').addEventListener('submit', e => {
        e.preventDefault();
        const inp = document.getElementById('new-habit-input');
        const val = inp.value.trim();
        if (!val) return;
        const habits = getHabits();
        if (habits.includes(val)) { inp.value = ''; return; }
        habits.push(val);
        saveHabits(habits);
        inp.value = '';
        renderHabits();
      });

      document.querySelectorAll('.delete-habit-btn').forEach(btn =>
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          const habits = getHabits();
          habits.splice(idx, 1);
          saveHabits(habits);
          renderHabits();
        })
      );

      document.getElementById('reset-habits-btn').addEventListener('click', () => {
        saveHabits([...DEFAULT_HABITS]);
        renderHabits();
      });
    }

    // ─── Render Recap ────────────────────────────────────────────────────
    function renderRecap() {
      const all = loadEntries();
      const entries = getWeekEntries(all);
      if (entries.length === 0) {
        views.recap.innerHTML = `<div class="space-y-4 animate-fade-in">
          <div class="text-center space-y-1">
            <h2 class="text-lg font-bold">Weekly Recap</h2>
            <p class="text-xs text-muted">${formatWeek()}</p>
          </div>
          <div class="flex flex-col items-center justify-center py-16 text-center space-y-3">
            <span class="text-5xl animate-float">📅</span>
            <h3 class="text-lg font-semibold">No data this week</h3>
            <p class="text-sm text-muted max-w-xs">Start checking in to see your weekly wrapped recap here.</p>
          </div>
        </div>`;
        return;
      }

      const sorted = [...entries].sort((a, b) => a.date.localeCompare(b.date));
      const moodEntries = sorted.filter(e => e.mood);
      const avgMood = moodEntries.length > 0 ? moodEntries.reduce((s, e) => s + e.mood, 0) / moodEntries.length : 0;
      const avgMoodRound = Math.round(avgMood);
      const moodCounts = {};
      for (const e of moodEntries) moodCounts[e.mood] = (moodCounts[e.mood] || 0) + 1;
      const topMood = Object.keys(moodCounts).length > 0
        ? parseInt(Object.entries(moodCounts).sort((a, b) => b[1] - a[1])[0][0])
        : null;

      const allEnt = sorted.flatMap(e => e.entertainment);
      const topRated = [...allEnt].sort((a, b) => b.rating - a.rating).slice(0, 3);
      const typeCounts = {};
      for (const ent of allEnt) typeCounts[ent.type] = (typeCounts[ent.type] || 0) + 1;
      const checkinDays = moodEntries.length;
      const totalDays = sorted.length;

      // Habits aggregation
      const habitTotals = {};
      for (const e of sorted) {
        if (e.habits) {
          for (const h of e.habits) {
            if (h.duration > 0) {
              habitTotals[h.name] = (habitTotals[h.name] || 0) + h.duration;
            }
          }
        }
      }
      const topHabits = Object.entries(habitTotals).sort((a, b) => b[1] - a[1]).slice(0, 3);

      const hasEnergy = sorted.some(e => e.energy);
      const avgEnergy = hasEnergy
        ? sorted.filter(e => e.energy).reduce((s, e) => s + e.energy, 0) / sorted.filter(e => e.energy).length
        : 0;
      const energyEmoji = avgEnergy ? ENERGY_LEVELS[Math.round(avgEnergy) - 1]?.emoji || '' : '';
      const hasSleep = sorted.some(e => e.sleep);
      const avgSleep = hasSleep
        ? sorted.filter(e => e.sleep).reduce((s, e) => s + e.sleep, 0) / sorted.filter(e => e.sleep).length
        : 0;

      // Mood bar details
      const moodBars = [1,2,3,4,5].map(m => {
        const count = moodEntries.filter(e => e.mood === m).length;
        const pct = moodEntries.length > 0 ? (count / moodEntries.length) * 100 : 0;
        return `<div class="flex flex-col items-center gap-1.5">
          <span class="text-lg">${MOOD_EMOJIS[m]}</span>
          <div class="w-7 h-16 mood-bar-track rounded-full overflow-hidden relative">
            <div class="absolute bottom-0 w-full mood-bar-fill transition-all duration-700 ease-out" style="height:${pct}%"></div>
          </div>
          <span class="text-[10px] font-semibold text-muted">${count}</span>
        </div>`;
      }).join('');

      const slides = [];

      // -- Slide 1: Header --
      slides.push(`<div class="wrapped-slide min-h-[60vh] flex flex-col items-center justify-center text-center py-16 px-4 rounded-3xl relative overflow-hidden shimmer-bg" data-delay="0">
        <div class="relative z-10 space-y-4">
          <div class="inline-block px-4 py-1.5 rounded-full text-[10px] font-semibold uppercase tracking-widest" style="background:color-mix(in srgb, var(--primary) 15%, transparent);color:var(--primary)">Weekly Wrapped</div>
          <h2 class="text-2xl font-bold" style="background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent">Your Week<br>in Review</h2>
          <p class="text-sm text-muted">${formatWeek()}</p>
          <div class="flex justify-center gap-2 text-sm text-muted">
            <span>${checkinDays} check-ins</span>
            <span>·</span>
            <span>${allEnt.length} logged</span>
          </div>
        </div>
      </div>`);

      // -- Slide 2: Mood --
      const moodCaption = topMood
        ? `You felt <strong>${MOODS[topMood - 1].label}</strong> most often this week`
        : '';
      slides.push(`<div class="wrapped-slide min-h-[50vh] flex flex-col items-center justify-center text-center py-16 px-4 rounded-3xl relative overflow-hidden" style="background:color-mix(in srgb, var(--primary) 8%, transparent)" data-delay="200">
        <div class="relative z-10 space-y-5 max-w-sm">
          <p class="text-[10px] font-semibold text-muted uppercase tracking-widest">Mood</p>
          <span class="text-7xl inline-block animate-float">${avgMood > 0 ? MOOD_EMOJIS[avgMoodRound] : '—'}</span>
          <div>
            <p class="text-lg font-semibold">${avgMood > 0 ? avgMood.toFixed(1) : 'N/A'} / 5</p>
            <p class="text-sm text-muted">${moodCaption}</p>
          </div>
          <div class="flex justify-center gap-2.5">${moodBars}</div>
          <div class="flex justify-center gap-6 pt-2">
            ${energyEmoji ? `<div class="text-center">
              <span class="text-2xl">${energyEmoji}</span>
              <p class="text-[10px] text-muted mt-0.5">Energy</p>
            </div>` : ''}
            ${avgSleep ? `<div class="text-center">
              <span class="text-2xl font-bold">${avgSleep.toFixed(1)}</span>
              <p class="text-[10px] text-muted mt-0.5">Sleep (h)</p>
            </div>` : ''}
          </div>
        </div>
      </div>`);

      // -- Slide 3: Habits --
      if (topHabits.length > 0) {
        slides.push(`<div class="wrapped-slide min-h-[50vh] flex flex-col items-center justify-center text-center py-16 px-4 rounded-3xl relative overflow-hidden" style="background:color-mix(in srgb, var(--accent) 6%, transparent)" data-delay="400">
          <div class="relative z-10 space-y-5 max-w-sm">
            <p class="text-[10px] font-semibold text-muted uppercase tracking-widest">Your Habits</p>
            <span class="text-5xl">🏃</span>
            <div class="space-y-3 w-full">
              ${topHabits.map(([name, mins], i) =>
                `<div class="flex items-center justify-between gap-3 card-hover-bg rounded-xl px-4 py-2.5 animate-slide-up" style="animation-delay:${i * 0.15}s">
                  <span class="text-sm font-medium">${name}</span>
                  <span class="text-xs font-semibold" style="color:var(--primary)">${mins}m total</span>
                </div>`
              ).join('')}
            </div>
          </div>
        </div>`);
      }

      // -- Slide 4: Entertainment Top Picks --
      if (topRated.length > 0) {
        slides.push(`<div class="wrapped-slide min-h-[50vh] flex flex-col items-center justify-center text-center py-16 px-4 rounded-3xl relative overflow-hidden shimmer-bg" data-delay="600">
          <div class="relative z-10 space-y-5 max-w-sm w-full">
            <p class="text-[10px] font-semibold text-muted uppercase tracking-widest">Top Entertainment</p>
            <span class="text-4xl">🎧</span>
            <div class="space-y-2.5">
              ${topRated.map((e, i) => {
                const meta = e.artist ? e.artist : e.author ? e.author : e.host ? e.host : '';
                return `<div class="flex items-center gap-3 card-hover-bg rounded-xl px-3.5 py-2.5 text-left animate-slide-up" style="animation-delay:${i * 0.15}s">
                  <span class="text-sm font-bold shrink-0" style="color:var(--primary)">#${i + 1}</span>
                  <div class="flex-1 min-w-0">
                    <div class="text-sm font-medium truncate">${e.title}</div>
                    ${meta ? `<div class="text-[10px] text-muted truncate">${meta}</div>` : ''}
                  </div>
                  <span class="text-xs shrink-0" style="color:var(--accent)">${'★'.repeat(e.rating)}</span>
                </div>`;
              }).join('')}
            </div>
            ${Object.keys(typeCounts).length > 0
              ? `<div class="flex flex-wrap justify-center gap-2 pt-1">` +
                Object.entries(typeCounts).map(([type, count]) =>
                  `<span class="text-[10px] px-2.5 py-1 rounded-full font-semibold" style="background:color-mix(in srgb, var(--primary) 12%, transparent);color:var(--primary)">${TYPE_LABELS[type] || type} ×${count}</span>`
                ).join('') + `</div>`
              : ''}
          </div>
        </div>`);
      }

      // -- Slide 5: Summary Stats --
      slides.push(`<div class="wrapped-slide min-h-[50vh] flex flex-col items-center justify-center text-center py-16 px-4 rounded-3xl relative overflow-hidden" style="background:color-mix(in srgb, var(--primary) 8%, transparent)" data-delay="800">
        <div class="relative z-10 space-y-6 max-w-sm">
          <p class="text-[10px] font-semibold text-muted uppercase tracking-widest">By the Numbers</p>
          <span class="text-5xl">📊</span>
          <div class="grid grid-cols-2 gap-3">
            <div class="card-hover-bg rounded-xl py-3 px-4">
              <p class="text-2xl font-bold" style="color:var(--primary)">${checkinDays}</p>
              <p class="text-[10px] text-muted font-medium">Days checked in</p>
            </div>
            <div class="card-hover-bg rounded-xl py-3 px-4">
              <p class="text-2xl font-bold" style="color:var(--primary)">${allEnt.length}</p>
              <p class="text-[10px] text-muted font-medium">Entertainment entries</p>
            </div>
            ${topHabits[0] ? `<div class="card-hover-bg rounded-xl py-3 px-4">
              <p class="text-lg font-bold truncate" style="color:var(--primary)" title="${topHabits[0][0]}">${topHabits[0][1]}m</p>
              <p class="text-[10px] text-muted font-medium">Top habit total</p>
            </div>` : ''}
            ${avgMood > 0 ? `<div class="card-hover-bg rounded-xl py-3 px-4">
              <p class="text-2xl font-bold" style="color:var(--primary)">${avgMood.toFixed(1)}</p>
              <p class="text-[10px] text-muted font-medium">Avg mood / 5</p>
            </div>` : ''}
          </div>
          <div class="pt-1">
            <p class="text-[10px] tracking-widest" style="color:color-mix(in srgb, var(--muted-text) 60%, transparent)">LIFE CHAPTERS · WEEKLY WRAPPED</p>
          </div>
        </div>
      </div>`);

      views.recap.innerHTML = `<div class="space-y-4 animate-fade-in pb-8" id="wrapped-container">
        ${slides.join('')}
      </div>`;

      // Staggered visibility via Intersection Observer
      setTimeout(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              entry.target.style.opacity = '1';
              entry.target.style.transform = 'translateY(0)';
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.15 });
        document.querySelectorAll('.wrapped-slide').forEach(el => {
          el.style.opacity = '0';
          el.style.transform = 'translateY(40px)';
          el.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
          observer.observe(el);
        });
      }, 100);
    }

    // ─── Account Setup ───────────────────────────────────────────────────
    function renderAccountSetup() {
      const colors = ['pink','red','orange','yellow','green','blue','purple','black','grey','white'];
      const colorSwatches = colors.map(c =>
        `<button type="button" data-color="${c}" class="color-btn w-8 h-8 rounded-full transition-all active:scale-90" style="background:${c};box-shadow:0 2px 6px rgba(0,0,0,0.1)" title="${c}"></button>`
      ).join('');

      const overlay = document.createElement('div');
      overlay.className = 'success-overlay';
      overlay.innerHTML = `<div class="success-card max-w-sm w-full mx-4 py-6 px-5" style="animation:scale-in 0.3s ease-out">
        <span class="text-3xl block mb-2">🔐</span>
        <h2 class="text-lg font-bold mb-1">Create Account</h2>
        <p class="text-xs text-muted mb-4">Unlock weekly wrapped and sync</p>
        <form id="account-form" class="space-y-3 text-left" style="font-family:system-ui,sans-serif">
          <div>
            <label class="text-[11px] font-semibold text-muted uppercase tracking-wider">Username</label>
            <input type="text" id="reg-username" placeholder="Choose a username" maxlength="30" class="w-full bg-transparent text-sm border border-color rounded-xl px-3 py-2 outline-none primary-ring mt-1" style="color:var(--fg);font-family:system-ui,sans-serif">
            <p class="text-[10px] text-muted mt-0.5" id="reg-username-msg"></p>
          </div>
          <div>
            <label class="text-[11px] font-semibold text-muted uppercase tracking-wider">Password</label>
            <input type="password" id="reg-password" placeholder="Create a password" maxlength="60" class="w-full bg-transparent text-sm border border-color rounded-xl px-3 py-2 outline-none primary-ring mt-1" style="color:var(--fg);font-family:system-ui,sans-serif">
          </div>
          <div>
            <label class="text-[11px] font-semibold text-muted uppercase tracking-wider">Age <span class="font-normal lowercase">optional</span></label>
            <input type="number" id="reg-age" min="1" max="150" placeholder="e.g. 25" class="w-full bg-transparent text-sm border border-color rounded-xl px-3 py-2 outline-none primary-ring mt-1" style="color:var(--fg);font-family:system-ui,sans-serif">
          </div>
          <div>
            <label class="text-[11px] font-semibold text-muted uppercase tracking-wider">Gender</label>
            <div class="grid grid-cols-2 gap-2 mt-1">
              ${['Female','Male','Non-binary','Prefer not to say'].map(g =>
                `<button type="button" data-gender="${g}" class="gender-btn px-3 py-2 rounded-xl text-xs font-medium transition-all card border border-color hover:card-hover-bg" style="font-family:system-ui,sans-serif">${g}</button>`
              ).join('')}
            </div>
          </div>
          <div>
            <label class="text-[11px] font-semibold text-muted uppercase tracking-wider">Color Theme</label>
            <div class="flex flex-wrap gap-2 mt-1">${colorSwatches}</div>
          </div>
          <button type="submit" class="w-full py-2.5 rounded-xl primary-bg text-white text-sm font-semibold transition-all hover:opacity-90 active:scale-[0.98] mt-1" style="font-family:system-ui,sans-serif;opacity:0.4" id="account-submit">Create Account</button>
        </form>
      </div>`;
      document.body.appendChild(overlay);

      let selectedGender = '';
      let selectedColor = '';
      document.querySelectorAll('.gender-btn').forEach(b =>
        b.addEventListener('click', () => {
          document.querySelectorAll('.gender-btn').forEach(x => { x.classList.remove('primary-bg', 'text-white'); x.classList.add('card', 'border', 'border-color'); });
          selectedGender = b.dataset.gender;
          b.classList.remove('card', 'border', 'border-color'); b.classList.add('primary-bg', 'text-white');
          checkReady();
        })
      );
      document.querySelectorAll('.color-btn').forEach(b =>
        b.addEventListener('click', () => {
          document.querySelectorAll('.color-btn').forEach(x => x.style.outline = 'none');
          selectedColor = b.dataset.color;
          b.style.outline = '3px solid var(--primary)'; b.style.outlineOffset = '2px';
          const t = buildTheme(selectedColor, window.matchMedia('(prefers-color-scheme: dark)').matches);
          Object.entries(t).forEach(([k, v]) => {
            const map = { pl: 'primary-light', hover: 'card-hover-bg', card: 'card-bg', muted: 'muted-text', border: 'border-color' };
            document.documentElement.style.setProperty('--' + (map[k] || k), v);
          });
          checkReady();
        })
      );
      document.getElementById('reg-username').addEventListener('input', () => validateUsername());
      function validateUsername() {
        const val = document.getElementById('reg-username').value.trim();
        const msg = document.getElementById('reg-username-msg');
        if (!val) { msg.textContent = ''; return false; }
        if (containsBannedWord(val)) { msg.textContent = 'Please choose a different username'; msg.style.color = 'red'; return false; }
        if (loadAccounts()[val]) { msg.textContent = 'Username taken'; msg.style.color = 'red'; return false; }
        msg.textContent = 'Available'; msg.style.color = 'green'; return true;
      }
      function checkReady() {
        const btn = document.getElementById('account-submit');
        const u = document.getElementById('reg-username').value.trim();
        const p = document.getElementById('reg-password').value;
        btn.style.opacity = u && p && selectedGender && selectedColor && !containsBannedWord(u) && !loadAccounts()[u] ? '1' : '0.4';
      }
      document.getElementById('reg-password').addEventListener('input', checkReady);
      document.getElementById('account-form').addEventListener('submit', e => {
        e.preventDefault();
        const u = document.getElementById('reg-username').value.trim();
        const p = document.getElementById('reg-password').value;
        if (!u || !p || !selectedGender || !selectedColor) return;
        if (containsBannedWord(u)) return;
        if (loadAccounts()[u]) return;
        const accounts = loadAccounts();
        accounts[u] = { hash: simpleHash(p), color: selectedColor, gender: selectedGender, age: parseInt(document.getElementById('reg-age').value) || null };
        saveAccounts(accounts);
        setSession(u);
        saveProfile({ age: parseInt(document.getElementById('reg-age').value) || null, gender: selectedGender, color: selectedColor });
        if (selectedGender.toLowerCase() === 'female') document.getElementById('nav-period').style.display = '';
        overlay.remove();
        renderTimeline();
      });
    }

    // ─── Login ────────────────────────────────────────────────────────────
    function renderLogin() {
      const overlay = document.createElement('div');
      overlay.className = 'success-overlay';
      overlay.innerHTML = `<div class="success-card max-w-sm w-full mx-4 py-6 px-5" style="animation:scale-in 0.3s ease-out">
        <span class="text-3xl block mb-2">👋</span>
        <h2 class="text-lg font-bold mb-1">Welcome Back</h2>
        <p class="text-xs text-muted mb-4">Log in to continue</p>
        <form id="login-form" class="space-y-3 text-left" style="font-family:system-ui,sans-serif">
          <div>
            <label class="text-[11px] font-semibold text-muted uppercase tracking-wider">Username</label>
            <input type="text" id="login-username" placeholder="Your username" class="w-full bg-transparent text-sm border border-color rounded-xl px-3 py-2 outline-none primary-ring mt-1" style="color:var(--fg);font-family:system-ui,sans-serif">
          </div>
          <div>
            <label class="text-[11px] font-semibold text-muted uppercase tracking-wider">Password</label>
            <input type="password" id="login-password" placeholder="Your password" class="w-full bg-transparent text-sm border border-color rounded-xl px-3 py-2 outline-none primary-ring mt-1" style="color:var(--fg);font-family:system-ui,sans-serif">
          </div>
          <p id="login-error" class="text-xs text-center" style="color:red;display:none">Invalid username or password</p>
          <button type="submit" class="w-full py-2.5 rounded-xl primary-bg text-white text-sm font-semibold transition-all hover:opacity-90 active:scale-[0.98]" style="font-family:system-ui,sans-serif">Log In</button>
        </form>
      </div>`;
      document.body.appendChild(overlay);

      document.getElementById('login-form').addEventListener('submit', e => {
        e.preventDefault();
        const u = document.getElementById('login-username').value.trim();
        const p = document.getElementById('login-password').value;
        const accounts = loadAccounts();
        if (accounts[u] && accounts[u].hash === simpleHash(p)) {
          setSession(u);
          const acct = accounts[u];
          if (acct.color || acct.gender) {
            saveProfile({ age: acct.age || null, gender: acct.gender || null, color: acct.color || 'blue' });
            applyProfileTheme(loadProfile());
            if (acct.gender && acct.gender.toLowerCase() === 'female') document.getElementById('nav-period').style.display = '';
          }
          overlay.remove();
          renderTimeline();
        } else {
          const err = document.getElementById('login-error');
          err.style.display = '';
          setTimeout(() => err.style.display = 'none', 2500);
        }
      });
    }

    // ─── Account Banner ───────────────────────────────────────────────────
    function renderAccountBanner() {
      if (!hasAccountBanner()) return '';
      return `<div class="card border rounded-2xl p-4 space-y-3 animate-fade-in" style="background:linear-gradient(135deg,color-mix(in srgb, var(--primary) 8%, transparent),transparent)">
        <div class="flex items-start gap-3">
          <span class="text-2xl">🔐</span>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold">Data saved!</p>
            <p class="text-xs text-muted mt-0.5">Create an account to unlock your weekly wrapped and keep your story safe.</p>
          </div>
        </div>
        <div class="flex gap-2">
          <button id="create-account-btn" class="flex-1 py-2 rounded-xl primary-bg text-white text-xs font-semibold transition-all hover:opacity-90 active:scale-95">Create Account</button>
          <button id="dismiss-banner-btn" class="px-3 py-2 rounded-xl text-xs font-medium transition-all hover:opacity-80 active:scale-95" style="color:var(--muted-text);background:color-mix(in srgb, var(--muted-text) 8%, transparent)">Later</button>
        </div>
      </div>`;
    }

    // ─── Render Period ───────────────────────────────────────────────────
    function renderPeriod() {
      const data = loadPeriods();
      const logs = data.logs || {};
      const today = todayStr();
      const isLogged = !!logs[today];
      const sortedDates = Object.keys(logs).sort();
      const lastStart = sortedDates.length > 0 ? sortedDates[0] : null;
      const cycleLen = data.cycleLength || 28;
      const periodLen = data.periodLength || 5;

      // Calculate next predicted start
      let nextPrediction = '';
      if (lastStart) {
        const last = new Date(lastStart + 'T12:00:00');
        last.setDate(last.getDate() + cycleLen);
        nextPrediction = last.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      }

      // Recent entries
      const recent = sortedDates.slice(0, 14);
      const recentHtml = recent.length > 0
        ? '<div class="space-y-1">' + recent.map(d => {
            const l = logs[d];
            const label = d === today ? 'Today' : new Date(d + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            const flowDots = l?.flow === 'Heavy' ? '🔴🔴🔴' : l?.flow === 'Medium' ? '🔴🔴' : l?.flow === 'Light' ? '🔴' : '';
            return `<div class="flex items-center gap-2 px-3 py-1.5 rounded-xl ${d === today ? 'card-hover-bg' : ''}" style="font-family:system-ui,sans-serif">
              <span class="text-xs font-medium flex-1" style="color:var(--fg)">${label}</span>
              ${flowDots ? `<span class="text-xs">${flowDots}</span>` : ''}
              ${l?.symptoms?.length ? `<span class="text-[10px] text-muted">${l.symptoms.slice(0, 2).join(', ')}${l.symptoms.length > 2 ? '…' : ''}</span>` : ''}
            </div>`;
          }).join('') + '</div>'
        : '<p class="text-xs text-muted text-center py-4" style="font-family:system-ui,sans-serif">No periods logged yet</p>';

      // Symptom toggles
      const symptomHtml = PERIOD_SYMPTOMS.map(s => {
        const sel = (logs[today]?.symptoms || []).includes(s);
        return `<button type="button" data-symp="${s}" class="symp-btn px-2.5 py-1.5 rounded-full text-xs font-medium transition-all ${sel ? 'primary-bg text-white' : 'card border border-color text-muted hover:border-primary/50'}">${s}</button>`;
      }).join('');

      views.period.innerHTML = `<div class="space-y-5 animate-fade-in" style="font-family:system-ui,sans-serif">
        <div class="text-center space-y-1 pb-1">
          <h2 class="text-lg font-bold" style="font-family:Chewy, sans-serif">Period Tracker</h2>
          <p class="text-xs text-muted">Track your cycle, symptoms, and flow</p>
        </div>

        <!-- Today's log -->
        <div class="shimmer-bg rounded-2xl p-4 space-y-3">
          <div class="flex items-center justify-between">
            <span class="text-xs font-semibold text-muted uppercase tracking-wider">${isLogged ? 'Update Today' : 'Log Today'}</span>
            <span class="text-[10px] text-muted">${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}</span>
          </div>
          ${!isLogged ? `<button id="start-period-btn" class="w-full py-3 rounded-xl font-semibold text-sm transition-all active:scale-[0.98] hover:opacity-90" style="background:color-mix(in srgb, red 12%, transparent);color:color-mix(in srgb, red 20%, var(--primary))">Start period</button>` : `
          <div class="space-y-3">
            <div>
              <label class="text-[10px] font-semibold text-muted uppercase tracking-wider mb-1.5 block">Flow</label>
              <div class="flex gap-2">${FLOW_LEVELS.map(f => {
                const sel = logs[today]?.flow === f;
                return `<button type="button" data-flow="${f}" class="flow-btn flex-1 py-2 rounded-xl text-xs font-semibold transition-all ${sel ? 'primary-bg text-white' : 'card border border-color text-muted hover:card-hover-bg'}">${f}</button>`;
              }).join('')}</div>
            </div>
            <div>
              <label class="text-[10px] font-semibold text-muted uppercase tracking-wider mb-1.5 block">Symptoms</label>
              <div class="flex flex-wrap gap-1.5">${symptomHtml}</div>
            </div>
            <input type="text" id="period-notes" value="${(logs[today]?.notes || '').replace(/"/g, '&quot;')}" placeholder="Notes..." maxlength="100" class="w-full bg-transparent text-xs border border-color rounded-xl px-3 py-2 outline-none primary-ring" style="color:var(--fg)">
            <div class="flex gap-2">
              <button id="update-period-btn" class="flex-1 py-2.5 rounded-xl primary-bg text-white text-sm font-semibold transition-all hover:opacity-90 active:scale-[0.98]">Update</button>
              <button id="end-period-btn" class="py-2.5 px-4 rounded-xl text-xs font-medium transition-all hover:opacity-80 active:scale-[0.98]" style="color:var(--muted-text);background:color-mix(in srgb, var(--muted-text) 8%, transparent)">End</button>
            </div>
          </div>`}
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-2">
          <div class="card-hover-bg rounded-xl py-2.5 text-center">
            <p class="text-xs text-muted" style="font-size:9px">Cycle</p>
            <p class="text-sm font-bold">${cycleLen}d</p>
          </div>
          <div class="card-hover-bg rounded-xl py-2.5 text-center">
            <p class="text-xs text-muted" style="font-size:9px">Period</p>
            <p class="text-sm font-bold">${periodLen}d</p>
          </div>
          <div class="card-hover-bg rounded-xl py-2.5 text-center">
            <p class="text-xs text-muted" style="font-size:9px">Logged</p>
            <p class="text-sm font-bold">${sortedDates.length}d</p>
          </div>
        </div>
        ${nextPrediction ? `<div class="text-center py-1">
          <p class="text-xs text-muted">Next predicted: <strong style="color:var(--primary)">${nextPrediction}</strong></p>
        </div>` : ''}

        <!-- Recent log -->
        <div class="section-card card border border-color rounded-2xl p-3.5 space-y-2">
          <div class="flex items-center justify-between">
            <span class="text-xs font-semibold text-muted uppercase tracking-wider">Recent</span>
            <span class="text-[10px] text-muted">${recent.length}</span>
          </div>
          ${recentHtml}
        </div>

        <!-- Cycle settings -->
        <details class="card border border-color rounded-2xl p-3.5">
          <summary class="text-xs font-semibold text-muted uppercase tracking-wider cursor-pointer">Cycle Settings</summary>
          <div class="space-y-2 mt-3">
            <div class="flex items-center gap-3">
              <label class="text-xs text-muted flex-1">Avg cycle length (days)</label>
              <input type="number" id="set-cycle" value="${cycleLen}" min="20" max="60" class="w-16 text-center text-sm bg-transparent border border-color rounded-lg py-1 outline-none primary-ring" style="color:var(--fg)">
            </div>
            <div class="flex items-center gap-3">
              <label class="text-xs text-muted flex-1">Avg period length (days)</label>
              <input type="number" id="set-period" value="${periodLen}" min="1" max="14" class="w-16 text-center text-sm bg-transparent border border-color rounded-lg py-1 outline-none primary-ring" style="color:var(--fg)">
            </div>
            <button id="save-cycle-btn" class="w-full py-2 rounded-xl primary-bg text-white text-xs font-semibold transition-all hover:opacity-90 active:scale-[0.98]">Save</button>
          </div>
        </details>
      </div>`;

      // Event wiring
      const startBtn = document.getElementById('start-period-btn');
      if (startBtn) startBtn.addEventListener('click', () => {
        const data = loadPeriods();
        data.logs[today] = { flow: 'Medium', symptoms: [], notes: '' };
        savePeriods(data);
        renderPeriod();
      });
      document.querySelectorAll('.flow-btn').forEach(b =>
        b.addEventListener('click', () => {
          const data = loadPeriods();
          if (!data.logs[today]) data.logs[today] = { flow: 'Medium', symptoms: [], notes: '' };
          data.logs[today].flow = b.dataset.flow;
          savePeriods(data);
          renderPeriod();
        })
      );
      document.querySelectorAll('.symp-btn').forEach(b =>
        b.addEventListener('click', () => {
          const data = loadPeriods();
          if (!data.logs[today]) data.logs[today] = { flow: 'Medium', symptoms: [], notes: '' };
          const s = b.dataset.symp;
          const symps = data.logs[today].symptoms || [];
          data.logs[today].symptoms = symps.includes(s) ? symps.filter(x => x !== s) : [...symps, s];
          savePeriods(data);
          renderPeriod();
        })
      );
      const notesInput = document.getElementById('period-notes');
      if (notesInput) notesInput.addEventListener('input', e => {
        const data = loadPeriods();
        if (!data.logs[today]) data.logs[today] = { flow: 'Medium', symptoms: [], notes: '' };
        data.logs[today].notes = e.target.value;
        savePeriods(data);
      });
      const updateBtn = document.getElementById('update-period-btn');
      if (updateBtn) updateBtn.addEventListener('click', () => renderPeriod());
      const endBtn = document.getElementById('end-period-btn');
      if (endBtn) endBtn.addEventListener('click', () => {
        const data = loadPeriods();
        delete data.logs[today];
        savePeriods(data);
        renderPeriod();
      });
      document.getElementById('save-cycle-btn').addEventListener('click', () => {
        const data = loadPeriods();
        const cl = parseInt(document.getElementById('set-cycle').value);
        const pl = parseInt(document.getElementById('set-period').value);
        if (cl > 0) data.cycleLength = cl;
        if (pl > 0) data.periodLength = pl;
        savePeriods(data);
        renderPeriod();
      });
    }

    // ─── Initial Render ──────────────────────────────────────────────────
    const session = getSession();
    if (hasAccounts() && !session) {
      renderLogin();
    } else {
      if (session) {
        const accts = loadAccounts();
        const acct = accts[session.username];
        if (acct && (acct.color || acct.gender)) {
          saveProfile({ age: acct.age || null, gender: acct.gender || null, color: acct.color || 'blue' });
          applyProfileTheme(loadProfile());
          if (acct.gender && acct.gender.toLowerCase() === 'female') document.getElementById('nav-period').style.display = '';
        }
      }
      renderTimeline();
    }
  </script>
</body>
</html>
